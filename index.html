<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculadora Orgânica | Morpho-Math</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Montserrat', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Fundo animado com partículas líquidas */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 40% 50%, rgba(70, 130, 200, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: drift 18s infinite alternate;
        }

        @keyframes drift {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.4; }
            100% { transform: translate(5%, 3%) scale(1.2); opacity: 0.7; }
        }

        /* Container principal - forma amorfa única */
        .morph-calculator {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(18px);
            border-radius: 68% 32% 72% 28% / 42% 38% 62% 58%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(100, 210, 255, 0.2) inset, 0 0 20px rgba(0, 255, 255, 0.2);
            padding: 1.6rem;
            transition: border-radius 0.6s ease, box-shadow 0.4s;
            animation: floatShape 8s infinite alternate ease-in-out;
        }

        @keyframes floatShape {
            0% {
                border-radius: 68% 32% 72% 28% / 42% 38% 62% 58%;
                box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(100, 210, 255, 0.3) inset;
            }
            100% {
                border-radius: 42% 58% 38% 62% / 58% 42% 58% 42%;
                box-shadow: 0 35px 55px rgba(0, 0, 0, 0.6), 0 0 0 3px rgba(0, 255, 200, 0.5) inset;
            }
        }

        /* Display único com efeito líquido */
        .display-panel {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 48% 52% 42% 58% / 68% 38% 62% 32%;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .expression {
            font-size: 1.2rem;
            color: #9dd9ff;
            font-family: 'Orbitron', monospace;
            text-align: right;
            min-height: 2rem;
            letter-spacing: 1px;
            word-break: break-word;
            opacity: 0.85;
            text-shadow: 0 0 3px cyan;
        }

        .result {
            font-size: 3.2rem;
            font-weight: 700;
            color: #f0fcff;
            text-align: right;
            font-family: 'Orbitron', monospace;
            letter-spacing: 2px;
            word-break: break-word;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
            line-height: 1.2;
            transition: 0.1s;
        }

        /* Grade de botões com formato orgânico */
        .key-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem 1rem;
        }

        /* Cada botão terá uma forma orgânica completamente única */
        .key {
            aspect-ratio: 1 / 0.9;
            background: linear-gradient(145deg, rgba(30, 45, 70, 0.9), rgba(10, 20, 35, 0.95));
            border: none;
            font-size: 1.5rem;
            font-weight: 600;
            color: #d6ecff;
            font-family: 'Montserrat', 'Segoe UI', monospace;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            /* Cada botão terá um border-radius único gerado dinamicamente via JS/CSS variável */
            transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
        }

        /* Efeito ripple individual */
        .key::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(0, 255, 200, 0.5), transparent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s, opacity 0.4s;
            opacity: 0;
            pointer-events: none;
        }

        .key:active::after {
            width: 120%;
            height: 120%;
            opacity: 0.6;
        }

        .key:active {
            transform: scale(0.94);
            background: linear-gradient(145deg, #1f3a60, #0e1a2c);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        /* Botões especiais com brilho */
        .key[data-action="equals"] {
            background: linear-gradient(135deg, #00b4aa, #007e7a);
            color: white;
            text-shadow: 0 0 4px black;
            box-shadow: 0 0 12px #00ffff77;
        }

        .key[data-action="clear"], .key[data-action="backspace"] {
            background: linear-gradient(145deg, #992d5e, #5e1e3c);
            color: #ffdbdb;
        }

        .key[data-func="unary"] {
            background: linear-gradient(145deg, #2c5780, #123a57);
            color: #c4ecff;
        }

        /* Hover sofisticado */
        @media (hover: hover) {
            .key:hover {
                background: linear-gradient(145deg, #2d517c, #15273f);
                color: white;
                box-shadow: 0 0 12px rgba(0, 200, 255, 0.4);
                transform: translateY(-2px);
            }
            .key[data-action="equals"]:hover {
                background: linear-gradient(135deg, #0ed9cd, #02a39a);
                box-shadow: 0 0 20px cyan;
            }
        }

        /* responsividade */
        @media (max-width: 550px) {
            .morph-calculator {
                padding: 1rem;
            }
            .key-grid {
                gap: 0.7rem;
            }
            .key {
                font-size: 1.2rem;
            }
            .result {
                font-size: 2.5rem;
            }
        }

        /* rótulo de assinatura */
        .signature {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #6f9fcf;
            letter-spacing: 2px;
            opacity: 0.7;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="morph-calculator">
    <div class="display-panel">
        <div class="expression" id="expressionDisplay"></div>
        <div class="result" id="resultDisplay">0</div>
    </div>
    <div class="key-grid" id="keyGrid">
        <!-- Os botões serão gerados via JS, garantindo IDs e classes dinâmicas -->
    </div>
    <div class="signature">✦ MORPHO-MATH | FORMA VIVA ✦</div>
</div>

<script>
    // ---------- CONFIGURAÇÃO DOS BOTÕES: Nomes, valores, ações ----------
    const buttonsConfig = [
        // Linha 1: funções unárias/limpeza
        { label: "AC",   action: "clear",        value: "clear",     type: "control" },
        { label: "±",    action: "negate",       value: "negate",    type: "unary" },
        { label: "%",    action: "percent",      value: "percent",   type: "unary" },
        { label: "√",    action: "sqrt",         value: "sqrt",      type: "unary" },
        { label: "^",    action: "power",        value: "^",         type: "operator" },
        // Linha 2: numerais e operadores
        { label: "7",    action: "number",       value: "7",         type: "digit" },
        { label: "8",    action: "number",       value: "8",         type: "digit" },
        { label: "9",    action: "number",       value: "9",         type: "digit" },
        { label: "÷",    action: "operator",     value: "/",         type: "operator" },
        { label: "×",    action: "operator",     value: "*",         type: "operator" },
        // Linha 3
        { label: "4",    action: "number",       value: "4",         type: "digit" },
        { label: "5",    action: "number",       value: "5",         type: "digit" },
        { label: "6",    action: "number",       value: "6",         type: "digit" },
        { label: "-",    action: "operator",     value: "-",         type: "operator" },
        { label: "+",    action: "operator",     value: "+",         type: "operator" },
        // Linha 4: números e = (ocupando 2 colunas visualmente no grid, mas teremos 5 botões, sendo '=' com colspan via CSS? não, mas posso manter '=' como um botão normal, sem colspan, mas mantenho layout limpo)
        { label: "1",    action: "number",       value: "1",         type: "digit" },
        { label: "2",    action: "number",       value: "2",         type: "digit" },
        { label: "3",    action: "number",       value: "3",         type: "digit" },
        { label: "=",    action: "equals",       value: "=",         type: "equal" },
        // Aqui adaptamos: para manter grade 5x5, após o = adicionamos um placeholder? não, quinto item será uma constante especial π
        { label: "π",    action: "constant",     value: "π",         type: "const" },
        // Linha 5: 0, ., e, backspace e constante e já temos pi, então colocamos backspace e e
        { label: "0",    action: "number",       value: "0",         type: "digit" },
        { label: ".",    action: "decimal",      value: ".",         type: "digit" },
        { label: "e",    action: "constant",     value: "e",         type: "const" },
        { label: "⌫",    action: "backspace",    value: "back",      type: "control" },
        { label: "x²",   action: "square",       value: "square",    type: "unary" }
    ];

    // Estado da calculadora
    let currentInput = "0";       // número atual sendo digitado
    let previousValue = null;     // valor armazenado antes da operação
    let currentOperator = null;    // operador pendente
    let waitingForOperand = false; // se true, próximo número começa novo
    let expressionHistory = "";    // mostrar expressão (opcional)
    let lastResult = null;

    // Elementos DOM
    const resultDiv = document.getElementById("resultDisplay");
    const expressionSpan = document.getElementById("expressionDisplay");

    // Atualiza display principal e histórico (opcional)
    function updateDisplay() {
        // Formata número grande
        let displayValue = currentInput;
        if (displayValue === "") displayValue = "0";
        // limita casas decimais visuais mas preserva precisão
        if (displayValue.length > 18 && !displayValue.includes("e")) {
            let num = parseFloat(displayValue);
            if (!isNaN(num)) displayValue = num.toExponential(12);
        }
        resultDiv.innerText = displayValue;
        // Atualiza expressão pequena
        if (expressionHistory) {
            expressionSpan.innerText = expressionHistory;
        } else if (previousValue !== null && currentOperator) {
            expressionSpan.innerText = `${formatNumberForExpr(previousValue)} ${currentOperator} `;
        } else {
            expressionSpan.innerText = "";
        }
    }

    function formatNumberForExpr(num) {
        if (num === null || num === undefined) return "";
        if (typeof num === "number") {
            if (Math.abs(num) > 1e12) return num.toExponential(8);
            return num.toString();
        }
        return num.toString();
    }

    // Operações básicas
    function calculate(a, op, b) {
        a = parseFloat(a);
        b = parseFloat(b);
        if (isNaN(a) || isNaN(b)) return NaN;
        switch (op) {
            case '+': return a + b;
            case '-': return a - b;
            case '*': return a * b;
            case '/': 
                if (b === 0) return NaN;
                return a / b;
            case '^': return Math.pow(a, b);
            default: return NaN;
        }
    }

    // Executa operação pendente (se existir)
    function performPendingOperation() {
        if (previousValue !== null && currentOperator !== null && !waitingForOperand) {
            let currentVal = parseFloat(currentInput);
            if (isNaN(currentVal)) {
                clearAll();
                return;
            }
            let result = calculate(previousValue, currentOperator, currentVal);
            if (isNaN(result) || !isFinite(result)) {
                resultDiv.innerText = "ERRO";
                expressionSpan.innerText = "Indefinido";
                currentInput = "Erro";
                previousValue = null;
                currentOperator = null;
                waitingForOperand = true;
                return;
            }
            // Armazena resultado
            currentInput = result.toString();
            previousValue = null;
            currentOperator = null;
            waitingForOperand = true;
            lastResult = result;
            updateDisplay();
        }
    }

    // Ações de entrada numérica
    function inputNumber(num) {
        if (currentInput === "Erro") clearAll();
        if (waitingForOperand) {
            currentInput = num;
            waitingForOperand = false;
        } else {
            // Evita múltiplos zeros iniciais
            if (currentInput === "0" && num !== ".") {
                currentInput = num;
            } else {
                currentInput += num;
            }
        }
        // Limita tamanho prático (evita overflow visual)
        if (currentInput.length > 20 && !currentInput.includes("e")) {
            currentInput = currentInput.slice(0, 20);
        }
        updateDisplay();
    }

    function inputDecimal() {
        if (currentInput === "Erro") clearAll();
        if (waitingForOperand) {
            currentInput = "0.";
            waitingForOperand = false;
            updateDisplay();
            return;
        }
        if (!currentInput.includes(".")) {
            currentInput += ".";
        }
        updateDisplay();
    }

    function backspace() {
        if (currentInput === "Erro") {
            clearAll();
            return;
        }
        if (waitingForOperand) return;
        if (currentInput.length === 1 || (currentInput.length === 2 && currentInput.startsWith("-"))) {
            currentInput = "0";
        } else {
            currentInput = currentInput.slice(0, -1);
            if (currentInput === "" || currentInput === "-") currentInput = "0";
        }
        updateDisplay();
    }

    function negate() {
        if (currentInput === "Erro") clearAll();
        let num = parseFloat(currentInput);
        if (isNaN(num)) return;
        num = -num;
        currentInput = num.toString();
        if (waitingForOperand) {
            waitingForOperand = false;
        }
        updateDisplay();
        // se há operador pendente mas ainda não novo operando? apenas atualiza
        if (previousValue !== null && currentOperator && !waitingForOperand) {
            // meio termo: melhor não confundir, mantem consistência
        }
    }

    function percent() {
        if (currentInput === "Erro") clearAll();
        let num = parseFloat(currentInput);
        if (isNaN(num)) return;
        num = num / 100;
        currentInput = num.toString();
        updateDisplay();
        if (!waitingForOperand && previousValue !== null && currentOperator) {
            // se há operação pendente, aplica percentual relativo ao previous? comportamento clássico: % modifica o atual
            // não altera a lógica de operação pendente, apenas exibe
        }
    }

    function sqrtOp() {
        if (currentInput === "Erro") clearAll();
        let num = parseFloat(currentInput);
        if (isNaN(num) || num < 0) {
            resultDiv.innerText = "ERRO";
            expressionSpan.innerText = "sqrt domínio";
            currentInput = "Erro";
            waitingForOperand = true;
            previousValue = null;
            currentOperator = null;
            updateDisplay();
            return;
        }
        let res = Math.sqrt(num);
        currentInput = res.toString();
        waitingForOperand = true;
        previousValue = null;
        currentOperator = null;
        updateDisplay();
        expressionHistory = `√(${num.toFixed(6)}) = ${res.toFixed(8)}`;
        updateDisplay();
    }

    function squareOp() {
        if (currentInput === "Erro") clearAll();
        let num = parseFloat(currentInput);
        if (isNaN(num)) return;
        let res = num * num;
        currentInput = res.toString();
        waitingForOperand = true;
        previousValue = null;
        currentOperator = null;
        updateDisplay();
        expressionHistory = `${num}² = ${res}`;
        updateDisplay();
    }

    function constant(value) {
        if (currentInput === "Erro") clearAll();
        let constVal = (value === 'π') ? Math.PI : Math.E;
        currentInput = constVal.toString();
        waitingForOperand = false;
        if (previousValue !== null && currentOperator && !waitingForOperand) {
            // Não commita automaticamente, só altera o operando corrente
        }
        updateDisplay();
    }

    function setOperator(op) {
        if (currentInput === "Erro") {
            clearAll();
        }
        // se já temos operação pendente e não estamos esperando operando, calcula antes
        if (previousValue !== null && currentOperator !== null && !waitingForOperand) {
            let currentVal = parseFloat(currentInput);
            if (!isNaN(currentVal)) {
                let result = calculate(previousValue, currentOperator, currentVal);
                if (isNaN(result) || !isFinite(result)) {
                    resultDiv.innerText = "ERRO";
                    expressionSpan.innerText = "Math Error";
                    currentInput = "Erro";
                    previousValue = null;
                    currentOperator = null;
                    waitingForOperand = true;
                    updateDisplay();
                    return;
                }
                previousValue = result;
                currentInput = result.toString();
                waitingForOperand = true;
                updateDisplay();
            } else {
                clearAll();
                return;
            }
        }
        // Agora define o novo operador
        currentOperator = op;
        previousValue = parseFloat(currentInput);
        if (isNaN(previousValue)) {
            clearAll();
            return;
        }
        waitingForOperand = true;
        expressionHistory = `${formatNumberForExpr(previousValue)} ${op}`;
        updateDisplay();
    }

    function equals() {
        if (currentInput === "Erro") {
            clearAll();
            return;
        }
        if (previousValue !== null && currentOperator !== null && !waitingForOperand) {
            let currentVal = parseFloat(currentInput);
            if (isNaN(currentVal)) {
                clearAll();
                return;
            }
            let result = calculate(previousValue, currentOperator, currentVal);
            if (isNaN(result) || !isFinite(result)) {
                resultDiv.innerText = "ERRO";
                expressionSpan.innerText = "Operação inválida";
                currentInput = "Erro";
                previousValue = null;
                currentOperator = null;
                waitingForOperand = true;
                updateDisplay();
                return;
            }
            currentInput = result.toString();
            expressionHistory = `${formatNumberForExpr(previousValue)} ${currentOperator} ${formatNumberForExpr(currentVal)} = ${result}`;
            previousValue = null;
            currentOperator = null;
            waitingForOperand = true;
            lastResult = result;
            updateDisplay();
        } else if (!waitingForOperand && previousValue === null && currentOperator === null) {
            // nada a calcular, mantém
            expressionHistory = "";
            updateDisplay();
        } else {
            // em caso de só operador pendente sem segundo número: ignora
            if (previousValue !== null && currentOperator !== null && waitingForOperand) {
                // mantém previous e apenas limpa espera?
            }
        }
        updateDisplay();
    }

    function clearAll() {
        currentInput = "0";
        previousValue = null;
        currentOperator = null;
        waitingForOperand = false;
        expressionHistory = "";
        updateDisplay();
    }

    // Função de dispatcher
    function handleButton(btn) {
        const action = btn.action;
        const val = btn.value;

        switch (action) {
            case "number": inputNumber(val); break;
            case "decimal": inputDecimal(); break;
            case "backspace": backspace(); break;
            case "clear": clearAll(); break;
            case "negate": negate(); break;
            case "percent": percent(); break;
            case "sqrt": sqrtOp(); break;
            case "square": squareOp(); break;
            case "constant": constant(val); break;
            case "operator": setOperator(val); break;
            case "equals": equals(); break;
            case "power": setOperator("^"); break;
            default: break;
        }
    }

    // geração de botões com formas únicas (border-radius orgânico por índice)
    function generateUniqueShapes() {
        const keys = document.querySelectorAll(".key");
        keys.forEach((key, idx) => {
            // cria valores radicalmente únicos para cada botão usando seno/cosseno do índice
            const r1 = 20 + (Math.sin(idx) * 40);
            const r2 = 30 + (Math.cos(idx * 1.7) * 35);
            const r3 = 15 + (Math.sin(idx * 2.3) * 45);
            const r4 = 25 + (Math.cos(idx * 0.9) * 50);
            const r5 = 40 + (Math.sin(idx * 1.1) * 30);
            const r6 = 20 + (Math.cos(idx * 1.4) * 45);
            const r7 = 10 + (Math.sin(idx * 2.8) * 55);
            const r8 = 35 + (Math.cos(idx * 0.5) * 40);
            
            const borderRadiusVal = `${Math.abs(r1)}% ${Math.abs(r2)}% ${Math.abs(r3)}% ${Math.abs(r4)}% / ${Math.abs(r5)}% ${Math.abs(r6)}% ${Math.abs(r7)}% ${Math.abs(r8)}%`;
            key.style.borderRadius = borderRadiusVal;
            // pequeno deslocamento de fundo suave
            key.style.transition = "border-radius 0.4s ease, transform 0.1s";
        });
    }

    // Montar teclado no grid
    function buildCalculatorUI() {
        const gridContainer = document.getElementById("keyGrid");
        gridContainer.innerHTML = "";
        buttonsConfig.forEach((btn, idx) => {
            const button = document.createElement("button");
            button.className = "key";
            button.innerText = btn.label;
            // data attributes
            button.setAttribute("data-action", btn.action);
            button.setAttribute("data-value", btn.value);
            if (btn.type === "unary") button.setAttribute("data-func", "unary");
            if (btn.action === "equals") button.style.fontSize = "1.8rem";
            if (btn.label === "π") button.style.fontFamily = "monospace";
            if (btn.label === "e") button.style.fontWeight = "bold";
            // adiciona evento
            button.addEventListener("click", (e) => {
                e.preventDefault();
                handleButton(btn);
                // micro interação adicional
                button.style.transform = "scale(0.96)";
                setTimeout(() => { button.style.transform = ""; }, 100);
            });
            gridContainer.appendChild(button);
        });
        // aplica border-radii únicos
        generateUniqueShapes();
        // evento para garantir redimensionamento
        window.addEventListener('resize', () => generateUniqueShapes());
    }

    // Teclado suporte físico
    function handleKeyboard(e) {
        const key = e.key;
        const validDigits = /[0-9]/;
        if (validDigits.test(key)) {
            e.preventDefault();
            inputNumber(key);
        } else if (key === '.') {
            e.preventDefault();
            inputDecimal();
        } else if (key === '+' || key === '-' || key === '*' || key === '/') {
            e.preventDefault();
            let op = key;
            if (key === '*') op = '*';
            if (key === '/') op = '/';
            setOperator(op);
        } else if (key === '^') {
            e.preventDefault();
            setOperator('^');
        } else if (key === 'Enter' || key === '=') {
            e.preventDefault();
            equals();
        } else if (key === 'Escape') {
            e.preventDefault();
            clearAll();
        } else if (key === 'Backspace') {
            e.preventDefault();
            backspace();
        } else if (key === '%') {
            e.preventDefault();
            percent();
        } else if (key === 's') {
            e.preventDefault();
            sqrtOp();
        }
    }

    // Inicialização
    function init() {
        buildCalculatorUI();
        updateDisplay();
        window.addEventListener('keydown', handleKeyboard);
        // Adiciona efeito de hover dinâmico nos shapes
    }

    init();
</script>
</body>
</html>
